<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Cg stroke='%23c0392b' stroke-width='2' fill='%23c0392b'%3E%3Ccircle cx='20' cy='20' r='9' fill-opacity='0.15'/%3E%3Cline x1='20' y1='4' x2='20' y2='11'/%3E%3Cline x1='20' y1='29' x2='20' y2='36'/%3E%3Cline x1='4' y1='20' x2='11' y2='20'/%3E%3Cline x1='29' y1='20' x2='36' y2='20'/%3E%3Cline x1='9' y1='9' x2='14' y2='14'/%3E%3Cline x1='26' y1='26' x2='31' y2='31'/%3E%3Cline x1='31' y1='9' x2='26' y2='14'/%3E%3Cline x1='14' y1='26' x2='9' y2='31'/%3E%3Ccircle cx='20' cy='4' r='2'/%3E%3Ccircle cx='20' cy='36' r='2'/%3E%3Ccircle cx='4' cy='20' r='2'/%3E%3Ccircle cx='36' cy='20' r='2'/%3E%3Ccircle cx='9' cy='9' r='2'/%3E%3Ccircle cx='31' cy='31' r='2'/%3E%3Ccircle cx='31' cy='9' r='2'/%3E%3Ccircle cx='9' cy='31' r='2'/%3E%3C/g%3E%3C/svg%3E">
<title>Three Waves The US COVID-19 Epidemic</title>
  
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-svg-annotation@2.5.1/d3-annotation.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600&family=Source+Sans+3&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Source Sans 3', sans-serif; max-width: 900px; margin: 20px auto; background: #faf7f2; color: #1a1a1a;}
  h1 { font-family: 'Source Serif 4', serif; font-size: 26px; }
  #caption { min-height: 48px; color: #333; }
  .full-line      { fill: none; stroke: #e0e0e0; stroke-width: 2.5; }
  .highlight-line { fill: none; stroke: #c0392b; stroke-width: 2.5; }
  .affordance { font-size: 12px; color: #888; font-style: italic; }
  button {
    margin: 4px 8px 12px 0; padding: 8px 18px;
    font-size: 14px; font-family: inherit;
    border: none; border-radius: 999px;          /* full pill */
    background: #2c3e50; color: #fff;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  button:hover:not(:disabled) { background: #1a2733; transform: translateY(-1px); }
  button:active:not(:disabled) { transform: translateY(0); }
  button:disabled { background: #d5d0c8; color: #fff; cursor: default; }
  #reveal { background: #c0392b; }
  #reveal:hover:not(:disabled) { background: #96281b; }
  #chart, #map {
  background: #fff;
  border: 1px solid #e5e0d8;
  border-radius: 4px;
  }
  #tooltip {
    position: absolute; display: none; pointer-events: none;
    background: white; border: 1px solid #999; border-radius: 3px;
    padding: 6px 8px; font-size: 12px; box-shadow: 2px 2px 4px rgba(0,0,0,0.2);
  }
  .annotation-note-title { font-weight: bold; }
</style>
</head>
<body>

<svg width="34" height="34" viewBox="0 0 40 40" style="vertical-align:middle">
  <g stroke="#c0392b" stroke-width="2" fill="#c0392b">
    <circle cx="20" cy="20" r="9" fill-opacity="0.15"/>
    <line x1="20" y1="4"  x2="20" y2="11"/><line x1="20" y1="29" x2="20" y2="36"/>
    <line x1="4"  y1="20" x2="11" y2="20"/><line x1="29" y1="20" x2="36" y2="20"/>
    <line x1="9"  y1="9"  x2="14" y2="14"/><line x1="26" y1="26" x2="31" y2="31"/>
    <line x1="31" y1="9"  x2="26" y2="14"/><line x1="14" y1="26" x2="9"  y2="31"/>
    <circle cx="20" cy="4" r="2"/><circle cx="20" cy="36" r="2"/>
    <circle cx="4" cy="20" r="2"/><circle cx="36" cy="20" r="2"/>
    <circle cx="9" cy="9" r="2"/><circle cx="31" cy="31" r="2"/>
    <circle cx="31" cy="9" r="2"/><circle cx="9" cy="31" r="2"/>
  </g>
</svg>

  
<h1 style="margin-bottom:2px;">The Three Waves of America's Pandemic</h1>
<h2 id="title" style="font-family:'Source Serif 4', serif; font-size:19px; color:#555; margin-top:4px;"></h2>
  
<p id="caption"></p>
<div>
  <button id="prev" onclick="changeScene(-1)">&#8592; Previous</button>
  <button id="next" onclick="changeScene(1)">Next &#8594;</button>
  <span id="progress" style="font-size:13px; color:#888; margin-left:10px;"></span>
  <button id="reveal" style="display:none" onclick="reveal()">Reveal the real curve</button>
</div>
<svg id="chart" width="880" height="470"></svg>
<p class="affordance">Background bands mark the seasons:
<span style="color:#7fbf7f">&#9632;</span> spring
<span style="color:#e8c547">&#9632;</span> summer
<span style="color:#d98e4a">&#9632;</span> autumn
<span style="color:#5b7fa6">&#9632;</span> winter</p>
<h3 id="mapTitle" style="margin-bottom:4px;"></h3>
<svg id="map" width="620" height="400"></svg>
<p class="affordance" id="mapCaption">Darker states saw more new cases per resident during this wave.</p>
<p class="affordance">Hover anywhere on the chart to see details for any day.</p>
<div id="tooltip"></div>

<script>
/* =====================================================================
   PARAMETERS (state variables of the narrative visualization)
   - sceneIndex : which scene is displayed (0, 1, 2)
   - data       : the processed dataset (7-day average of new cases)
   ===================================================================== */
let sceneIndex = 0;
let data = [];
let drawing = false;     // is the mouse held down in the draw scene
let guesses = {};        // user's drawn prediction {timestamp: value}
let revealed = false;    // has the true curve been revealed
const DRAW_SCENE_INDEX = 1;   // position of the draw scene in the scenes array
let stateData = [];
let usTopo = null;
/* Scene definitions: each scene highlights one date window and carries
   its own title, caption, and annotation text. The chart TEMPLATE is
   identical in every scene (visual consistency); only the highlight
   window and annotations change. */
const scenes = [
  {
    type: "draw",
    start: "2020-01-21", end: "2023-03-23",
    title: "You lived through this. Can you draw it?",
    caption: "Before we walk through the waves: draw your best guess of how daily cases rose and fell. Click and drag across the chart, then press Reveal. (Only the first two months are shown to start you off.)"
  },
  {
    start: "2020-01-21", end: "2023-03-23",
    title: "Overview: One pandemic, three waves",
    caption: "From January 2020 to March 2023, the US recorded over 100 million confirmed cases \u2014 but they didn't come evenly. Three distinct waves defined the pandemic. Click Next to walk through each one.",
    annTitle: "Peak of the pandemic",
    annLabel: "Each wave was larger than the last."
  },
  {
    start: "2020-03-01", end: "2020-06-15",
    title: "Wave 1 (Spring 2020): The virus arrives",
    caption: "The first wave hit fast, centered on the Northeast. Testing was scarce, so confirmed cases understate the true spread. Lockdowns brought the curve down by early summer.",
    annTitle: "First peak",
    annLabel: "Limited testing means the true count was far higher."
  },
  {
    start: "2020-10-01", end: "2021-02-28",
    title: "Wave 2 (Winter 2020\u201321): Everywhere at once",
    caption: "The winter wave dwarfed the first: no region was spared. Vaccines arrived in December 2020, and cases fell sharply through early 2021 as vaccination expanded.",
    annTitle: "Winter peak",
    annLabel: "The largest wave before variants \u2014 nationwide spread."
  },
  {
    start: "2021-07-01", end: "2022-03-15",
    title: "Wave 3 (Delta &amp; Omicron): The variant era",
    caption: "Delta struck the South in summer 2021; Omicron then produced the tallest spike of the entire pandemic in January 2022 \u2014 even among the vaccinated, though with less severe outcomes.",
    annTitle: "Omicron peak",
    annLabel: "The single highest case count of the pandemic."
  }
];
/*============= state population====================*/
const statePop = {"Alabama":5024279,"Alaska":733391,"Arizona":7151502,"Arkansas":3011524,
"California":39538223,"Colorado":5773714,"Connecticut":3605944,"Delaware":989948,
"District of Columbia":689545,"Florida":21538187,"Georgia":10711908,"Hawaii":1455271,
"Idaho":1839106,"Illinois":12812508,"Indiana":6785528,"Iowa":3190369,"Kansas":2937880,
"Kentucky":4505836,"Louisiana":4657757,"Maine":1362359,"Maryland":6177224,
"Massachusetts":7029917,"Michigan":10077331,"Minnesota":5706494,"Mississippi":2961279,
"Missouri":6154913,"Montana":1084225,"Nebraska":1961504,"Nevada":3104614,
"New Hampshire":1377529,"New Jersey":9288994,"New Mexico":2117522,"New York":20201249,
"North Carolina":10439388,"North Dakota":779094,"Ohio":11799448,"Oklahoma":3959353,
"Oregon":4237256,"Pennsylvania":13002700,"Rhode Island":1097379,"South Carolina":5118425,
"South Dakota":886667,"Tennessee":6910840,"Texas":29145505,"Utah":3271616,
"Vermont":643077,"Virginia":8631393,"Washington":7705281,"West Virginia":1793716,
"Wisconsin":5893718,"Wyoming":576851};
/* ============ shared chart template (margin convention) ============ */
const margin = {top: 40, right: 30, bottom: 70, left: 70};
const width  = 880 - margin.left - margin.right;
const height = 440 - margin.top  - margin.bottom;

const svg = d3.select("#chart");
const parseDate = d3.timeParse("%Y-%m-%d");
const fmtDate   = d3.timeFormat("%b %d, %Y");
const fmtNum    = d3.format(",");

const x = d3.scaleTime().range([0, width]);
const y = d3.scaleLinear().range([height, 0]);

const lineGen = d3.line()
  .x(d => x(d.date))
  .y(d => y(d.avg));
  
const areaGen = d3.area()
  .x(d => x(d.date))
  .y0(() => y(0))
  .y1(d => y(d.avg));
/* ==================== load and process the data ====================
   us.csv columns: date, cases, deaths (cumulative national totals).
   We compute daily new cases, then a trailing 7-day average.        */
Promise.all([
  d3.csv("us.csv", d => ({ date: parseDate(d.date), cases: +d.cases, deaths: +d.deaths })),
  d3.csv("us-states.csv", d => ({ date: parseDate(d.date), state: d.state, cases: +d.cases })),
  d3.json("states-10m.json")
]).then(([raw, states, topo]) => {
  stateData = states;
  usTopo = topo;
  raw.sort((a, b) => a.date - b.date);

    // daily new cases from cumulative counts
    const daily = raw.map((d, i) => ({
      date: d.date,
      cumulative: d.cases,
      newCases: i === 0 ? 0 : Math.max(0, d.cases - raw[i - 1].cases)
    }));

    // trailing 7-day average
    data = daily.map((d, i) => {
      const window = daily.slice(Math.max(0, i - 6), i + 1);
      const avg = d3.mean(window, w => w.newCases);
      return { date: d.date, cumulative: d.cumulative, newCases: d.newCases, avg: avg };
    });

    x.domain(d3.extent(data, d => d.date));
    y.domain([0, d3.max(data, d => d.avg)]).nice();

    drawScene();
  });

/* ==================== TRIGGER: navigation buttons ====================
   Clicking Prev/Next changes the sceneIndex PARAMETER, then the display
   is rebuilt from that state.                                          */
function changeScene(delta) {
  sceneIndex = Math.max(0, Math.min(scenes.length - 1, sceneIndex + delta));
  drawScene();
}

/* ============== rebuild the display from current state ============== */
function drawScene() {
  const s = scenes[sceneIndex];

  d3.select("#title").html(s.title);
  d3.select("#caption").text(s.caption);
  d3.select("#progress").text("Scene " + (sceneIndex + 1) + " of " + scenes.length);
  d3.select("#prev").property("disabled", sceneIndex === 0);
  d3.select("#next").property("disabled", sceneIndex === scenes.length - 1);
  //reset draw-scene state whenever we land on any scene :)
  drawing = false; guesses = {}; revealed = false;
  const isDraw = s.type === "draw";
  d3.select("#reveal").style("display", isDraw ? "inline-block" : "none");
  d3.select("#map").style("display", isDraw ? "none" : "block");
  d3.select("#mapTitle").style("display", isDraw ? "none" : "block");
  d3.select("#mapCaption").style("display", isDraw ? "none" : "block");
  svg.selectAll("*").remove();
  const g = svg.append("g")
    .attr("transform", `translate(${margin.left},${margin.top})`);

  //Axes (identical in every scene = template consistency as requested :) )
  g.append("g")
    .attr("transform", `translate(0,${height})`)
    .call(d3.axisBottom(x).ticks(d3.timeMonth.every(3))
      .tickFormat(d3.timeFormat("%b"))
      .tickSizeOuter(0))
    .selectAll("text").attr("font-size", "10px");
  // year bracket wanna make it look fancy :)
  const years = d3.timeYear.range(
      d3.timeYear.floor(x.domain()[0]), 
      d3.timeYear.offset(d3.timeYear.floor(x.domain()[1]), 1));
  const yearTier = g.append("g").attr("transform", `translate(0,${height + 28})`);
  years.forEach(yr => {
    const x0 = Math.max(0, x(yr));
    const x1 = Math.min(width, x(d3.timeYear.offset(yr, 1)));
    if (x1 - x0 < 30) return;               // skip slivers at the edges
    yearTier.append("path")                  // the bracket: ⌐...¬ shape
      .attr("d", `M${x0 + 2},0 v5 H${x1 - 2} v-5`)
      .attr("fill", "none").attr("stroke", "#999");
    yearTier.append("text")
      .attr("x", (x0 + x1) / 2).attr("y", 18)
      .attr("text-anchor", "middle")
      .attr("font-size", "12px").attr("font-weight", "600").attr("fill", "#555")
      .text(yr.getFullYear());
  });
  // ---- season bands + symbols ----
  const seasonDefs = [
    { name: "spring", startMonth: 2,  color: "#7fbf7f" }, // Mar 1
    { name: "summer", startMonth: 5,  color: "#e8c547" }, // Jun 1, 
    { name: "autumn", startMonth: 8,  color: "#d98e4a" }, // Sep 1, 
    { name: "winter", startMonth: 11, color: "#5b7fa6" } // Dec 1, 
  ];

  const [dom0, dom1] = x.domain();
  for (let yr = dom0.getFullYear() - 1; yr <= dom1.getFullYear(); yr++) {
    seasonDefs.forEach(sd => {
      const s0 = new Date(yr, sd.startMonth, 1);
      const s1 = new Date(yr, sd.startMonth + 3, 1);   // JS rolls into next year fine
      const px0 = Math.max(0, x(s0)), px1 = Math.min(width, x(s1));
      if (px1 - px0 < 8) return;                       // clipped sliver: skip
      g.insert("rect", ":first-child")                 // bands BEHIND everything
        .attr("x", px0).attr("width", px1 - px0)
        .attr("y", 0).attr("height", height)
        .attr("fill", sd.color).attr("opacity", 0.07);
      
    });
  }
  g.append("g")
    .call(d3.axisLeft(y).ticks(6).tickFormat(d3.format("~s")).tickSize(-width))
    .call(g2 => g2.selectAll(".tick line").attr("stroke", "#eee"))
    .call(g2 => g2.select(".domain").remove());
  g.append("text")
    .attr("transform", "rotate(-90)")
    .attr("x", -height / 2).attr("y", -55)
    .attr("text-anchor", "middle").attr("font-size", "12px")
    .text("New cases per day (7-day average)");
  if (!isDraw) {

  // full timeline in grey (context, same in every scene)
  g.append("path").datum(data).attr("class", "full-line").attr("d", lineGen);

  // highlighted wave for this scene
  const start = parseDate(s.start), end = parseDate(s.end);
  const slice = data.filter(d => d.date >= start && d.date <= end);
  g.append("path").datum(slice).attr("class", "highlight-line")
    .attr("d", lineGen)
    .attr("opacity", 0).transition().duration(600).attr("opacity", 1);
  g.append("path").datum(slice)
    .attr("fill", "#c0392b").attr("opacity", 0.08)
    .attr("d", areaGen);

  /* ============ ANNOTATION (d3-annotation, one template) ============
     Anchored to the computed peak of the highlighted window, so the
     annotation always points at real data.                            */
  const peak = slice.reduce((a, b) => (b.avg > a.avg ? b : a), slice[0]);
  const annotations = [{
    note: {
      title: s.annTitle + ": " + fmtNum(Math.round(peak.avg)) + " cases/day",
      label: s.annLabel,
      wrap: 220
    },
    x: x(peak.date), y: y(peak.avg),
    dx: x(peak.date) > width / 2 ? -150 : 80,
    dy: y(peak.avg) < height / 2 ? 60 : -80
  }];
  g.append("g")
    .attr("class", "annotation-group")
    .call(d3.annotation().type(d3.annotationCalloutCircle)
          .annotations(annotations));

  /* ========= TRIGGER: hover tooltip, active in EVERY scene =========
     (this per-step exploration is what makes the structure an
     interactive slideshow rather than a martini glass)                */
  const tooltip = d3.select("#tooltip");
  const bisect = d3.bisector(d => d.date).center;
  const focus = g.append("circle")
    .attr("r", 4).attr("fill", "#c0392b").style("display", "none");

  g.append("rect")
    .attr("width", width).attr("height", height)
    .attr("fill", "none").attr("pointer-events", "all")
    .on("mousemove", function(event) {
      const [mx] = d3.pointer(event, this);
      const i = bisect(data, x.invert(mx));
      const d = data[i];
      focus.style("display", null)
        .attr("cx", x(d.date)).attr("cy", y(d.avg));
      tooltip.style("display", "block")
        .style("left", (event.pageX + 14) + "px")
        .style("top",  (event.pageY - 10) + "px")
        .html("<b>" + fmtDate(d.date) + "</b><br>" +
              "7-day avg: " + fmtNum(Math.round(d.avg)) + " new cases/day<br>" +
              "Cumulative: " + fmtNum(d.cumulative));
    })
    .on("mouseleave", function() {
      focus.style("display", "none");
      tooltip.style("display", "none");
      });
    if (usTopo) drawMap();
  } else {
    drawDrawScene(g);
  }
}


function drawDrawScene(g) {
  // show only the first two months as a starter
  const starterEnd = parseDate("2020-03-21");
  const starter = data.filter(d => d.date <= starterEnd);
  g.append("path").datum(starter).attr("class", "highlight-line").attr("d", lineGen);

  // dashed path that will show the user's guess
  const guessPath = g.append("path")
    .attr("fill", "none").attr("stroke", "#2c3e50")
    .attr("stroke-width", 2).attr("stroke-dasharray", "5 4");

  // capture rect for drawing (replaces the tooltip rect in this scene)
  g.append("rect")
    .attr("width", width).attr("height", height)
    .attr("fill", "none").attr("pointer-events", "all")
    .style("cursor", "crosshair")
    .on("mousedown", () => { drawing = true; })
    .on("mouseup",   () => { drawing = false; })
    .on("mouseleave",() => { drawing = false; })
    .on("mousemove", function(event) {
      if (!drawing || revealed) return;
      const [mx, my] = d3.pointer(event, this);
      const date = x.invert(mx);
      if (date <= starterEnd) return;                    // can't redraw the starter
      const val = Math.max(0, y.invert(my));
      // bucket guesses by week so the object stays small and the line smooth
      const week = d3.timeWeek.floor(date).getTime();
      guesses[week] = val;
      const pts = Object.keys(guesses).sort((a,b) => a-b)
        .map(k => ({ date: new Date(+k), avg: guesses[k] }));
      guessPath.datum(pts).attr("d", lineGen);
    });
}

function reveal() {
  if (scenes[sceneIndex].type !== "draw" || revealed) return;
  revealed = true;
  const g = svg.select("g");
  const path = g.append("path").datum(data)
    .attr("class", "highlight-line").attr("d", lineGen);
  const len = path.node().getTotalLength();
  path.attr("stroke-dasharray", len).attr("stroke-dashoffset", len)
    .transition().duration(2500).ease(d3.easeLinear)
    .attr("stroke-dashoffset", 0);
  d3.select("#caption").text(
    "The real curve. Most people underestimate Omicron's January 2022 spike \u2014 " +
    "it towers over everything that came before. Click Next to walk through each wave.");
}
/*=============for the map===============*/
/* New cases per 100k residents, per state, within a date window.
   Cumulative at window end minus cumulative at window start.      */
function casesByState(start, end) {
  const result = {};
  const perState = d3.group(stateData, d => d.state);
  perState.forEach((rows, state) => {
    if (!statePop[state]) return;              // skips territories
    rows.sort((a, b) => a.date - b.date);
    const before = rows.filter(d => d.date < start);
    const during = rows.filter(d => d.date <= end);
    const startCum = before.length ? before[before.length - 1].cases : 0;
    const endCum   = during.length ? during[during.length - 1].cases : 0;
    result[state] = (endCum - startCum) / statePop[state] * 100000;
  });
  return result;
}

function drawMap() {
  const s = scenes[sceneIndex];
  const values = casesByState(parseDate(s.start), parseDate(s.end));

  d3.select("#mapTitle").text("Where this wave hit: new cases per 100k residents");

  const mapSvg = d3.select("#map");
  mapSvg.selectAll("*").remove();

  const statesGeo = topojson.feature(usTopo, usTopo.objects.states).features;
  const projection = d3.geoAlbersUsa().fitSize([620, 400], 
                      topojson.feature(usTopo, usTopo.objects.states));
  const path = d3.geoPath(projection);

  const maxVal = d3.max(Object.values(values));
  const color = d3.scaleSequential(d3.interpolateReds).domain([0, maxVal]);

  mapSvg.selectAll("path")
    .data(statesGeo)
    .enter().append("path")
      .attr("d", path)
      .attr("fill", d => {
        const v = values[d.properties.name];
        return v === undefined ? "#f0f0f0" : color(v);
      })
      .attr("stroke", "#fff").attr("stroke-width", 0.5)
    .append("title")   // native tooltip: state name + value on hover
      .text(d => {
        const v = values[d.properties.name];
        return d.properties.name + (v === undefined ? "" :
               ": " + fmtNum(Math.round(v)) + " cases per 100k");
      });
}
</script>
</body>
</html>
